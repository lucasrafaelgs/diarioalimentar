<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário Alimentar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FFFFFF;
  --bg-soft:#F2F3F6;
  --surface:#FFFFFF;
  --ink:#181B20;
  --ink-soft:#767C87;
  --line:#E7E9EE;
  --fill-mid:#4A4A4A;
  --fill-light:#B8B8B8;
  --blue:#2F6FED; --blue-soft:#EAF1FE; --blue-text:#1D4ED8;
  --green:#16A34A; --green-soft:#E7F6EC; --green-text:#166534;
  --amber:#D97706; --amber-soft:#FDF2E3; --amber-text:#92400E;
  --red:#E0483C; --red-soft:#FDEAEA; --red-text:#B0231A;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 4px 10px rgba(16,24,40,.05);
  --radius-lg:16px;
  --radius-md:12px;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: var(--sans);
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg-soft);
  color:var(--ink);
  font-family:var(--sans);
  font-variant-numeric:tabular-nums;
  padding:24px 16px 64px;
}
.wrap{max-width:980px;margin:0 auto;}

header{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:16px 20px;
  margin-bottom:22px;
}
header h1{
  font-family:var(--sans);
  font-weight:700;
  font-size:22px;
  margin:0;
  letter-spacing:-0.2px;
}
header p{
  margin:2px 0 0;
  color:var(--ink-soft);
  font-size:12px;
}
.session-bar{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
  color:var(--ink-soft);
}
.session-bar button{
  border:none;
  background:var(--red-soft);
  color:var(--red-text);
  font-family:var(--sans);
  font-weight:600;
  font-size:12px;
  padding:8px 16px;
  border-radius:999px;
  cursor:pointer;
}
.session-bar button:hover{background:var(--red);color:#fff;}

/* ---------- Auth gate ---------- */
#authGate{
  display:flex;
  min-height:70vh;
  align-items:center;
  justify-content:center;
}
.auth-box{
  background:var(--surface);
  border:none;
  box-shadow:var(--shadow);
  border-radius:var(--radius-lg);
  padding:28px 26px;
  width:100%;
  max-width:340px;
}
.auth-box h2{
  font-size:18px;
  font-weight:700;
  margin:0 0 4px;
}
.auth-box p{
  font-size:12px;
  color:var(--ink-soft);
  margin:0 0 16px;
}
.auth-box input{
  width:100%;
  padding:9px 10px;
  margin-bottom:10px;
  border:1px solid var(--line);
  border-radius:6px;
  font-family:var(--sans);
  font-size:14px;
  background:var(--bg);
}
.auth-box button{
  width:100%;
  padding:11px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}
.auth-box button:hover{background:var(--blue-text);}
.auth-error{
  font-size:12px;
  color:var(--red-text);
  background:var(--red-soft);
  border:none;
  padding:8px 10px;
  border-radius:8px;
  margin-top:10px;
  display:none;
}

.datebar{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:none;
  box-shadow:var(--shadow);
  border-radius:var(--radius-md);
  padding:10px 12px;
  margin-bottom:22px;
}
.datebar button{
  border:none;
  background:var(--bg-soft);
  color:var(--ink);
  border-radius:10px;
  width:34px;height:34px;
  font-size:16px;
  cursor:pointer;
}
.datebar button:hover{background:var(--ink);color:#fff;}
.datebar input[type="date"]{
  border:none;
  background:transparent;
  font-family:var(--sans);
  font-size:14px;
  color:var(--ink);
  flex:1;
}
.datebar .today-btn{
  border:none;
  color:var(--blue-text);
  background:var(--blue-soft);
  font-family:var(--sans);
  font-weight:600;
  font-size:12px;
  padding:0 14px;
  width:auto;
  border-radius:999px;
}
.savestate{
  font-size:11px;
  color:var(--ink-soft);
  font-family:var(--sans);
  min-width:70px;
  text-align:right;
}

.grid{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:22px;
  align-items:start;
}
@media (max-width:760px){
  .grid{grid-template-columns:1fr;}
}

.meal{
  background:var(--surface);
  border:none;
  box-shadow:var(--shadow);
  border-radius:var(--radius-lg);
  padding:18px 18px 14px;
  margin-bottom:16px;
}
.meal h2{
  font-family:var(--sans);
  font-weight:700;
  font-size:16px;
  margin:0 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:baseline;
}
.meal h2 small{
  font-family:var(--sans);
  font-size:12px;
  color:var(--ink-soft);
  font-weight:600;
  background:var(--bg-soft);
  padding:3px 9px;
  border-radius:999px;
}
.item-row{
  display:grid;
  grid-template-columns:1fr 70px 60px 26px;
  gap:8px;
  align-items:center;
  padding:7px 0;
  border-bottom:1px solid var(--line);
  font-size:13px;
}
.item-row:last-of-type{border-bottom:none;}
.item-row select, .item-row input{
  font-family:var(--sans);
  font-size:13px;
  padding:7px 8px;
  border:1px solid var(--line);
  border-radius:9px;
  background:var(--bg-soft);
  color:var(--ink);
  width:100%;
}
.item-row .unit{
  font-family:var(--sans);
  font-size:11px;
  color:var(--ink-soft);
}
.item-row .rm{
  border:none;
  background:var(--red-soft);
  color:var(--red-text);
  font-size:15px;
  line-height:24px;
  width:24px;height:24px;
  border-radius:999px;
  cursor:pointer;
  text-align:center;
}
.custom-fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
  margin:4px 0 8px;
}
.custom-fields input{
  font-family:var(--sans);
  font-size:12px;
  padding:6px 7px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--bg-soft);
}
.custom-fields input::placeholder{color:#A8A8A8;}

.add-btn{
  margin-top:8px;
  border:none;
  color:var(--blue-text);
  background:var(--blue-soft);
  padding:8px 14px;
  font-size:12px;
  font-weight:600;
  border-radius:999px;
  cursor:pointer;
  font-family:var(--sans);
}
.add-btn:hover{background:var(--blue);color:#fff;}

/* ---------- Painel resumo — cards KPI ---------- */
.summary-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}
.summary-head h3{
  font-family:var(--sans);
  font-weight:700;
  font-size:16px;
  margin:0;
}
.summary-head .date-label{
  font-family:var(--sans);
  font-size:12px;
  color:var(--ink-soft);
}
.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}
.kpi-card{
  background:var(--surface);
  box-shadow:var(--shadow);
  border-radius:var(--radius-md);
  border-left:4px solid var(--ink-soft);
  padding:12px 14px;
}
.kpi-card .kpi-label{
  font-size:11px;
  color:var(--ink-soft);
  margin-bottom:2px;
}
.kpi-card .kpi-value{
  font-size:22px;
  font-weight:700;
  line-height:1.2;
}
.kpi-card .kpi-value span{font-size:12px;font-weight:500;color:var(--ink-soft);}
.kpi-ok{border-left-color:var(--green);}
.kpi-low{border-left-color:var(--amber);}
.kpi-high{border-left-color:var(--red);}

.target-panel{
  background:var(--surface);
  box-shadow:var(--shadow);
  border-radius:var(--radius-lg);
  padding:16px 16px 14px;
  position:sticky;
  top:16px;
}
.target{margin-bottom:14px;}
.target:last-child{margin-bottom:0;}
.target-label{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--ink-soft);
  margin-bottom:5px;
}
.bar-track{
  position:relative;
  height:10px;
  background:var(--bg-soft);
  border-radius:999px;
  overflow:hidden;
}
.bar-zone{
  position:absolute;
  top:0;bottom:0;
  background:var(--green-soft);
}
.bar-fill{
  position:absolute;
  top:0;bottom:0;left:0;
  border-radius:999px;
  transition:width .3s ease;
}
.bar-marker{
  position:absolute;
  top:-3px;bottom:-3px;
  width:2px;
  background:var(--ink);
}
.status-chip{
  display:inline-block;
  font-family:var(--sans);
  font-weight:600;
  font-size:11px;
  padding:3px 10px;
  border-radius:999px;
  margin-top:5px;
}
.chip-ok{background:var(--green-soft);color:var(--green-text);}
.chip-low{background:var(--amber-soft);color:var(--amber-text);}
.chip-high{background:var(--red-soft);color:var(--red-text);}

.footnote{
  font-size:11px;
  color:var(--ink-soft);
  padding-top:12px;
  line-height:1.5;
}

.history{
  margin-top:18px;
  background:var(--surface);
  border:none;
  box-shadow:var(--shadow);
  border-radius:var(--radius-lg);
  padding:16px 16px 14px;
}
.history h3{
  font-family:var(--sans);
  font-weight:700;
  font-size:15px;
  margin:0 0 8px;
}
.history table{width:100%;border-collapse:collapse;font-size:12px;}
.history th, .history td{
  text-align:left;
  padding:7px 6px;
  border-bottom:1px solid var(--line);
  font-family:var(--sans);
}
.history th{color:var(--ink-soft);font-weight:600;}
.history tr:hover td{background:var(--bg-soft);cursor:pointer;}
.history .empty{color:var(--ink-soft);font-family:var(--sans);font-size:12px;}

/* ---------- Água ---------- */
.water-card{
  background:var(--surface);
  box-shadow:var(--shadow);
  border-radius:var(--radius-lg);
  padding:18px 18px 16px;
  margin-bottom:16px;
  border-left:4px solid var(--blue);
}
.water-card h2{
  font-size:16px;font-weight:700;margin:0 0 10px;
  display:flex;justify-content:space-between;align-items:baseline;
}
.water-card h2 small{
  font-size:12px;font-weight:600;color:var(--blue-text);
  background:var(--blue-soft);padding:3px 9px;border-radius:999px;
}
.water-quick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.water-quick button{
  border:none;background:var(--blue-soft);color:var(--blue-text);
  font-weight:600;font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;
}
.water-quick button:hover{background:var(--blue);color:#fff;}
.water-custom{display:flex;gap:8px;margin-bottom:12px;}
.water-custom input{
  flex:1;font-family:var(--sans);font-size:13px;padding:8px 10px;
  border:1px solid var(--line);border-radius:9px;background:var(--bg-soft);
}
.water-custom button{
  border:none;background:var(--ink);color:#fff;font-weight:600;
  padding:8px 16px;border-radius:9px;cursor:pointer;font-size:13px;
}
.water-log-list{max-height:110px;overflow-y:auto;margin-top:6px;}
.water-log-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--ink-soft);padding:5px 0;border-bottom:1px solid var(--line);
}
.water-log-row:last-child{border-bottom:none;}
.water-log-row .rm{
  border:none;background:var(--red-soft);color:var(--red-text);
  width:20px;height:20px;border-radius:999px;font-size:13px;line-height:20px;cursor:pointer;
}

.export-bar{display:flex;gap:10px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.export-bar button{
  border:none;background:var(--surface);box-shadow:var(--shadow);color:var(--ink);
  font-weight:600;font-size:12px;padding:9px 16px;border-radius:999px;cursor:pointer;
}
.export-bar button:hover{background:var(--ink);color:#fff;}
.reset-link{
  display:block;
  text-align:center;
  margin-top:26px;
  font-size:11px;
  color:var(--ink-soft);
  text-decoration:underline;
  cursor:pointer;
  background:none;
  border:none;
  width:100%;
}
</style>
</head>
<body>
<div class="wrap">

  <div id="authGate">
    <div class="auth-box">
      <h2>Entrar</h2>
      <p>Diário alimentar — acesso restrito</p>
      <input type="email" id="authEmail" placeholder="e-mail" autocomplete="username">
      <input type="password" id="authPassword" placeholder="senha" autocomplete="current-password">
      <button id="authSubmit">Entrar</button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <div id="appRoot" style="display:none;">
    <header>
      <div>
        <h1>Diário Alimentar</h1>
        <p>Roteiro alimentar · macros calculados com base nas tabelas já checadas</p>
      </div>
      <div class="session-bar">
        <span id="userEmail"></span>
        <button id="signOutBtn">sair</button>
      </div>
    </header>

    <div class="datebar">
      <button id="prevDay">‹</button>
      <input type="date" id="dateInput">
      <button id="nextDay">›</button>
      <button class="today-btn" id="todayBtn">hoje</button>
      <span class="savestate" id="saveState"></span>
    </div>

    <div class="water-card">
      <h2>Água <small id="waterHeaderTotal">0 ml</small></h2>
      <div class="water-quick">
        <button data-water="200">+200ml (copo)</button>
        <button data-water="300">+300ml</button>
        <button data-water="500">+500ml (garrafinha)</button>
      </div>
      <div class="water-custom">
        <input type="number" id="waterCustomMl" placeholder="quantidade personalizada (ml)">
        <button id="waterCustomAdd">adicionar</button>
      </div>
      <div class="target">
        <div class="target-label"><span>Meta do dia (3.500 ml)</span><span id="waterLabelVal">0 ml</span></div>
        <div class="bar-track"><div class="bar-fill" id="waterBarFill" style="width:0%;background:var(--blue);"></div></div>
      </div>
      <div class="water-log-list" id="waterLogList"></div>
    </div>

    <div class="grid">
      <div id="meals"></div>

      <div>
        <div class="summary-head"><h3>Resumo do dia</h3><span class="date-label" id="summaryDateLabel"></span></div>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="target-panel" id="targetPanel"></div>
        <div class="history">
          <h3>Últimos dias</h3>
          <div id="historyBody"><span class="empty">Carregando…</span></div>
        </div>
      </div>
    </div>

    <div class="export-bar">
      <button class="add-btn" id="exportSummary">exportar resumo (.csv)</button>
      <button class="add-btn" id="exportDetailed">exportar detalhado (.json)</button>
    </div>
    <button class="reset-link" id="resetDay">limpar tudo do dia selecionado</button>
  </div>
</div>

<script>

  {key:'extra', label:'Refeições extras / beliscos'},
];

const WATER_TARGET_ML = 3500;

const TARGET_KCAL_MIN = 1600, TARGET_KCAL_MAX = 1800, TARGET_PROT = 140;
const SCALE_KCAL_MAX = 2400, SCALE_PROT_MAX = 240;

let currentDate = todayStr();
let dayData = emptyDay();
let saveTimer = null;
let waterEntries = []; // [{id, ml, created_at}] do dia atual

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function emptyDay(){ return MEALS.reduce((acc,m)=>{acc[m.key]=[];return acc;},{}); }
function newItem(foodId){ const f=FOOD_MAP[foodId]; return {foodId, qty:f.dq, custom:null}; }
function newCustomItem(){ return {foodId:'custom', custom:{name:'', kcal:0, carb:0, prot:0, sat:0}}; }

function computeItemValues(item){
  if(item.foodId==='custom'){
    const c = item.custom || {};
    return {kcal:+c.kcal||0, carb:+c.carb||0, prot:+c.prot||0, sat:+c.sat||0};
  }
  const f = FOOD_MAP[item.foodId];
  const factor = (item.qty||0)/f.base;
  return {kcal:f.kcal*factor, carb:f.carb*factor, prot:f.prot*factor, sat:f.sat*factor};
}
function mealTotals(mealKey){
  return dayData[mealKey].reduce((acc,item)=>{
    const v = computeItemValues(item);
    acc.kcal+=v.kcal; acc.carb+=v.carb; acc.prot+=v.prot; acc.sat+=v.sat;
    return acc;
  },{kcal:0,carb:0,prot:0,sat:0});
}
function dayTotals(){
  return MEALS.reduce((acc,m)=>{
    const t = mealTotals(m.key);
    acc.kcal+=t.kcal; acc.carb+=t.carb; acc.prot+=t.prot; acc.sat+=t.sat;
    return acc;
  },{kcal:0,carb:0,prot:0,sat:0});
}
function setSaveState(txt){ document.getElementById('saveState').textContent = txt; }

/* ---------- Render ---------- */
function renderAll(){ renderMeals(); renderSummary(); }

function renderMeals(){
  const container = document.getElementById('meals');
  container.innerHTML = '';
  MEALS.forEach(m=>{
    const card = document.createElement('div');
    card.className='meal';
    const t = mealTotals(m.key);
    card.innerHTML = `<h2>${m.label} <small>${Math.round(t.kcal)} kcal · ${t.prot.toFixed(1)}g prot.</small></h2>
      <div class="rows" data-meal="${m.key}"></div>
      <button class="add-btn" data-add="${m.key}">+ adicionar item</button>
      <button class="add-btn" data-addcustom="${m.key}" style="margin-left:6px;">+ item personalizado</button>`;
    container.appendChild(card);
    const rowsEl = card.querySelector('.rows');
    dayData[m.key].forEach((item,idx)=>renderRow(rowsEl, m.key, item, idx));
  });
  container.querySelectorAll('[data-add]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      dayData[btn.getAttribute('data-add')].push(newItem(FOOD_DB[0].id));
      renderAll(); scheduleSave();
    });
  });
  container.querySelectorAll('[data-addcustom]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      dayData[btn.getAttribute('data-addcustom')].push(newCustomItem());
      renderAll(); scheduleSave();
    });
  });
}

function renderRow(rowsEl, mealKey, item, idx){
  const wrap = document.createElement('div');
  if(item.foodId==='custom'){
    wrap.innerHTML = `
      <div class="item-row">
        <input type="text" placeholder="nome do item" value="${item.custom.name||''}" data-field="name">
        <span></span><span></span>
        <button class="rm" data-rm="1">×</button>
      </div>
      <div class="custom-fields">
        <input type="number" step="0.1" placeholder="kcal" value="${item.custom.kcal||''}" data-field="kcal">
        <input type="number" step="0.1" placeholder="carb (g)" value="${item.custom.carb||''}" data-field="carb">
        <input type="number" step="0.1" placeholder="prot (g)" value="${item.custom.prot||''}" data-field="prot">
        <input type="number" step="0.1" placeholder="sat (g)" value="${item.custom.sat||''}" data-field="sat">
      </div>`;
    wrap.querySelectorAll('[data-field]').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const field = inp.getAttribute('data-field');
        item.custom[field] = field==='name' ? inp.value : (parseFloat(inp.value)||0);
        renderSummary(); updateMealHeader(mealKey); scheduleSave();
      });
    });
    wrap.querySelector('[data-rm]').addEventListener('click',()=>{
      dayData[mealKey].splice(idx,1); renderAll(); scheduleSave();
    });
    rowsEl.appendChild(wrap);
    return;
  }

  const f = FOOD_MAP[item.foodId];
  const select = document.createElement('select');
  CATS.forEach(cat=>{
    const og = document.createElement('optgroup'); og.label = cat;
    FOOD_DB.filter(x=>x.cat===cat).forEach(x=>{
      const opt = document.createElement('option');
      opt.value = x.id; opt.textContent = x.name;
      if(x.id===item.foodId) opt.selected = true;
      og.appendChild(opt);
    });
    select.appendChild(og);
  });

  wrap.className='item-row';
  wrap.appendChild(select);

  const qtyInput = document.createElement('input');
  qtyInput.type='number'; qtyInput.step='1'; qtyInput.value=item.qty;
  wrap.appendChild(qtyInput);

  const unitSpan = document.createElement('span');
  unitSpan.className='unit'; unitSpan.textContent=f.unit;
  wrap.appendChild(unitSpan);

  const rm = document.createElement('button');
  rm.className='rm'; rm.textContent='×';
  wrap.appendChild(rm);

  select.addEventListener('change',()=>{
    item.foodId = select.value;
    item.qty = FOOD_MAP[item.foodId].dq;
    renderAll(); scheduleSave();
  });
  qtyInput.addEventListener('input',()=>{
    item.qty = parseFloat(qtyInput.value)||0;
    renderSummary(); updateMealHeader(mealKey); scheduleSave();
  });
  rm.addEventListener('click',()=>{
    dayData[mealKey].splice(idx,1); renderAll(); scheduleSave();
  });
  rowsEl.appendChild(wrap);
}

function updateMealHeader(mealKey){
  const t = mealTotals(mealKey);
  const card = document.querySelector(`.rows[data-meal="${mealKey}"]`).closest('.meal');
  card.querySelector('h2 small').textContent = `${Math.round(t.kcal)} kcal · ${t.prot.toFixed(1)}g prot.`;
}

function renderSummary(){
  const t = dayTotals();
  document.getElementById('summaryDateLabel').textContent = currentDate;

  const kcalStatus = t.kcal < TARGET_KCAL_MIN ? 'low' : (t.kcal > TARGET_KCAL_MAX ? 'high' : 'ok');
  const protStatus = t.prot >= TARGET_PROT ? 'ok' : 'low';

  const kpiGrid = document.getElementById('kpiGrid');
  kpiGrid.innerHTML = `
    <div class="kpi-card kpi-${kcalStatus}">
      <div class="kpi-label">Calorias</div>
      <div class="kpi-value">${Math.round(t.kcal)} <span>kcal</span></div>
    </div>
    <div class="kpi-card kpi-${protStatus}">
      <div class="kpi-label">Proteínas</div>
      <div class="kpi-value">${t.prot.toFixed(1)} <span>g</span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Carboidratos</div>
      <div class="kpi-value">${t.carb.toFixed(1)} <span>g</span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Gordura saturada</div>
      <div class="kpi-value">${t.sat.toFixed(1)} <span>g</span></div>
    </div>
  `;

  const panel = document.getElementById('targetPanel');
  panel.innerHTML = `
    <div class="target">
      <div class="target-label"><span>Calorias vs. faixa-alvo (1.600–1.800 kcal)</span><span>${Math.round(t.kcal)}</span></div>
      <div class="bar-track">
        <div class="bar-zone" style="left:${pct(TARGET_KCAL_MIN,SCALE_KCAL_MAX)}%;width:${pct(TARGET_KCAL_MAX-TARGET_KCAL_MIN,SCALE_KCAL_MAX)}%;"></div>
        <div class="bar-fill" style="width:${pct(Math.min(t.kcal,SCALE_KCAL_MAX),SCALE_KCAL_MAX)}%;background:${barColor(kcalStatus)};"></div>
      </div>
      <span class="status-chip chip-${kcalStatus}">${kcalStatus==='ok'?'✓ dentro da faixa':kcalStatus==='low'?'↓ abaixo do piso':'↑ acima do teto'}</span>
    </div>
    <div class="target">
      <div class="target-label"><span>Proteína vs. meta (≥140 g)</span><span>${t.prot.toFixed(1)}</span></div>
      <div class="bar-track">
        <div class="bar-marker" style="left:${pct(TARGET_PROT,SCALE_PROT_MAX)}%;"></div>
        <div class="bar-fill" style="width:${pct(Math.min(t.prot,SCALE_PROT_MAX),SCALE_PROT_MAX)}%;background:${barColor(protStatus)};"></div>
      </div>
      <span class="status-chip chip-${protStatus}">${protStatus==='ok'?'✓ meta batida':'↓ faltam '+(TARGET_PROT-t.prot).toFixed(1)+'g'}</span>
    </div>
    <div class="footnote">Faixa de referência baseada no acompanhamento médico/nutricional já discutido. Ferramenta de acompanhamento pessoal — não substitui orientação profissional.</div>
  `;
}
function pct(v,scale){return Math.max(0,Math.min(100,(v/scale)*100));}
function barColor(status){
  if(status==='ok') return 'var(--green)';
  if(status==='low') return 'var(--amber)';
  return 'var(--red)';
}

/* ---------- Persistência via Supabase ---------- */
async function loadDay(date){
  setSaveState('carregando…');
  dayData = emptyDay();
  try{
    const { data, error } = await sb.from('diary_entries').select('*').eq('entry_date', date);
    if(error) throw error;
    (data||[]).forEach(row=>{
      const item = row.food_id
        ? {foodId: row.food_id, qty: Number(row.qty)}
        : {foodId:'custom', custom:{name:row.custom_name, kcal:Number(row.kcal), carb:Number(row.carb), prot:Number(row.prot), sat:Number(row.sat)}};
      if(dayData[row.meal]) dayData[row.meal].push(item);
    });
  }catch(e){ console.error(e); }
  setSaveState('');
  renderAll();
}

function scheduleSave(){
  setSaveState('editando…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveDay, 700);
}

async function saveDay(){
  setSaveState('salvando…');
  try{
    await sb.from('diary_entries').delete().eq('entry_date', currentDate);
    const rows = [];
    MEALS.forEach(m=>{
      dayData[m.key].forEach(item=>{
        const v = computeItemValues(item);
        rows.push({
          entry_date: currentDate,
          meal: m.key,
          food_id: item.foodId==='custom' ? null : item.foodId,
          custom_name: item.foodId==='custom' ? (item.custom.name||'item personalizado') : null,
          qty: item.foodId==='custom' ? 1 : item.qty,
          kcal: v.kcal, carb: v.carb, prot: v.prot, sat: v.sat
        });
      });
    });
    if(rows.length>0){
      const { error } = await sb.from('diary_entries').insert(rows);
      if(error) throw error;
    }
    setSaveState('salvo ✓');
    loadHistory();
  }catch(e){
    console.error(e);
    setSaveState('erro ao salvar');
  }
}

async function loadHistory(){
  const body = document.getElementById('historyBody');
  try{
    const [foodRes, waterRes] = await Promise.all([
      sb.from('diary_entries').select('entry_date, kcal, prot').order('entry_date', {ascending:false}).limit(1000),
      sb.from('water_log').select('entry_date, ml').order('entry_date', {ascending:false}).limit(1000),
    ]);
    if(foodRes.error) throw foodRes.error;
    if(waterRes.error) throw waterRes.error;

    const byDate = {};
    (foodRes.data||[]).forEach(r=>{
      const k = r.entry_date;
      if(!byDate[k]) byDate[k] = {kcal:0, prot:0, water:0};
      byDate[k].kcal += Number(r.kcal);
      byDate[k].prot += Number(r.prot);
    });
    (waterRes.data||[]).forEach(r=>{
      const k = r.entry_date;
      if(!byDate[k]) byDate[k] = {kcal:0, prot:0, water:0};
      byDate[k].water += Number(r.ml);
    });

    const dates = Object.keys(byDate).sort().reverse().slice(0,10);
    if(dates.length===0){ body.innerHTML = '<span class="empty">Nenhum dia salvo ainda.</span>'; return; }
    body.innerHTML = `<table><thead><tr><th>Data</th><th>Kcal</th><th>Prot.</th><th>Água</th></tr></thead>
      <tbody>${dates.map(d=>`<tr data-jump="${d}"><td>${d}</td><td>${Math.round(byDate[d].kcal)}</td><td>${byDate[d].prot.toFixed(1)}g</td><td>${(byDate[d].water/1000).toFixed(1)}L</td></tr>`).join('')}</tbody></table>`;
    body.querySelectorAll('[data-jump]').forEach(tr=>{
      tr.addEventListener('click',()=>{
        const d = tr.getAttribute('data-jump');
        document.getElementById('dateInput').value = d;
        setCurrentDate(d);
      });
    });
  }catch(e){
    console.error(e);
    body.innerHTML = '<span class="empty">Não foi possível carregar o histórico.</span>';
  }
}

/* ---------- Água ---------- */
async function loadWater(date){
  waterEntries = [];
  try{
    const { data, error } = await sb.from('water_log').select('*').eq('entry_date', date).order('created_at',{ascending:true});
    if(error) throw error;
    waterEntries = data||[];
  }catch(e){ console.error(e); }
  renderWater();
}

function renderWater(){
  const total = waterEntries.reduce((s,e)=>s+Number(e.ml),0);
  document.getElementById('waterHeaderTotal').textContent = `${Math.round(total)} ml`;
  document.getElementById('waterLabelVal').textContent = `${Math.round(total)} / ${WATER_TARGET_ML} ml`;
  const fill = document.getElementById('waterBarFill');
  fill.style.width = pct(Math.min(total,WATER_TARGET_ML), WATER_TARGET_ML)+'%';
  fill.style.background = total>=WATER_TARGET_ML ? 'var(--green)' : 'var(--blue)';

  const list = document.getElementById('waterLogList');
  if(waterEntries.length===0){
    list.innerHTML = '<span class="empty" style="font-size:12px;color:var(--ink-soft);">Nenhum registro ainda hoje.</span>';
    return;
  }
  list.innerHTML = waterEntries.map(e=>{
    const time = new Date(e.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="water-log-row"><span>${time} — ${Math.round(Number(e.ml))} ml</span><button class="rm" data-waterrm="${e.id}">×</button></div>`;
  }).join('');
  list.querySelectorAll('[data-waterrm]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-waterrm');
      try{
        await sb.from('water_log').delete().eq('id', id);
        await loadWater(currentDate);
        loadHistory();
      }catch(e){ console.error(e); }
    });
  });
}

async function addWater(ml){
  if(!ml || ml<=0) return;
  try{
    await sb.from('water_log').insert({entry_date: currentDate, ml});
    await loadWater(currentDate);
    loadHistory();
  }catch(e){ console.error(e); }
}

document.querySelectorAll('[data-water]').forEach(btn=>{
  btn.addEventListener('click',()=>addWater(parseFloat(btn.getAttribute('data-water'))));
});
document.getElementById('waterCustomAdd').addEventListener('click',()=>{
  const input = document.getElementById('waterCustomMl');
  addWater(parseFloat(input.value)||0);
  input.value = '';
});

/* ---------- Navegação de data ---------- */
function setCurrentDate(dateStr){
  currentDate = dateStr;
  document.getElementById('dateInput').value = dateStr;
  loadDay(dateStr);
  loadWater(dateStr);
}
function shiftDay(delta){
  const d = new Date(currentDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  setCurrentDate(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
}

/* ---------- Exportação ---------- */
async function fetchAllRows(){
  const { data, error } = await sb.from('diary_entries').select('*').order('entry_date',{ascending:true});
  if(error) throw error;
  return data||[];
}

async function fetchAllWater(){
  const { data, error } = await sb.from('water_log').select('*').order('entry_date',{ascending:true});
  if(error) throw error;
  return data||[];
}

document.getElementById('exportSummary').addEventListener('click', async ()=>{
  try{
    const [rows, waterRows] = await Promise.all([fetchAllRows(), fetchAllWater()]);
    if(rows.length===0 && waterRows.length===0){ alert('Nenhum dia salvo ainda para exportar.'); return; }
    const byDate = {};
    rows.forEach(r=>{
      if(!byDate[r.entry_date]) byDate[r.entry_date]={kcal:0,carb:0,prot:0,sat:0,water:0};
      byDate[r.entry_date].kcal+=Number(r.kcal); byDate[r.entry_date].carb+=Number(r.carb);
      byDate[r.entry_date].prot+=Number(r.prot); byDate[r.entry_date].sat+=Number(r.sat);
    });
    waterRows.forEach(r=>{
      if(!byDate[r.entry_date]) byDate[r.entry_date]={kcal:0,carb:0,prot:0,sat:0,water:0};
      byDate[r.entry_date].water+=Number(r.ml);
    });
    const header = 'data,kcal,carboidratos_g,proteinas_g,gordura_saturada_g,agua_ml\n';
    const lines = Object.keys(byDate).sort().map(d=>{
      const t = byDate[d];
      return `${d},${t.kcal.toFixed(1)},${t.carb.toFixed(1)},${t.prot.toFixed(1)},${t.sat.toFixed(1)},${t.water.toFixed(0)}`;
    });
    downloadFile('diario_alimentar_resumo.csv', header+lines.join('\n'), 'text/csv');
  }catch(e){ alert('Erro ao exportar: '+e.message); }
});

document.getElementById('exportDetailed').addEventListener('click', async ()=>{
  try{
    const [rows, waterRows] = await Promise.all([fetchAllRows(), fetchAllWater()]);
    if(rows.length===0 && waterRows.length===0){ alert('Nenhum dia salvo ainda para exportar.'); return; }
    downloadFile('diario_alimentar_detalhado.json', JSON.stringify({refeicoes:rows, agua:waterRows},null,2), 'application/json');
  }catch(e){ alert('Erro ao exportar: '+e.message); }
});

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- Auth ---------- */
async function checkSession(){
  const { data } = await sb.auth.getSession();
  if(data.session){ showApp(data.session.user.email); } else { showAuthGate(); }
}
function showApp(email){
  document.getElementById('authGate').style.display='none';
  document.getElementById('appRoot').style.display='block';
  document.getElementById('userEmail').textContent = email||'';
  document.getElementById('dateInput').value = currentDate;
  loadDay(currentDate);
  loadWater(currentDate);
  loadHistory();
}
function showAuthGate(){
  document.getElementById('authGate').style.display='flex';
  document.getElementById('appRoot').style.display='none';
}
document.getElementById('authSubmit').addEventListener('click', async ()=>{
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errBox = document.getElementById('authError');
  errBox.style.display='none';
  const { data, error } = await sb.auth.signInWithPassword({email,password});
  if(error){ errBox.textContent = 'E-mail ou senha inválidos.'; errBox.style.display='block'; return; }
  showApp(data.user.email);
});
document.getElementById('signOutBtn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  showAuthGate();
});

document.getElementById('dateInput').addEventListener('change',(e)=>setCurrentDate(e.target.value));
document.getElementById('prevDay').addEventListener('click',()=>shiftDay(-1));
document.getElementById('nextDay').addEventListener('click',()=>shiftDay(1));
document.getElementById('todayBtn').addEventListener('click',()=>setCurrentDate(todayStr()));
document.getElementById('resetDay').addEventListener('click',async ()=>{
  if(!confirm('Limpar todos os itens do dia selecionado?')) return;
  dayData = emptyDay();
  renderAll();
  await saveDay();
});

checkSession();
</script>
</body>
</html>
