name: Manter Supabase ativo

on:
  schedule:
    - cron: '0 9 * * 1,4'   # toda segunda e quinta, 09:00 UTC
  workflow_dispatch:          # permite rodar manualmente pra testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fazer uma requisição leve ao Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://yevruomdcemnvmmdkleh.supabase.co/rest/v1/food_items?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}")
          echo "Status da resposta: $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "Requisição falhou"
            exit 1
          fi
